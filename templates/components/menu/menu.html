{% load static %}
<header class="pie-menu">
  <div class="pie-menu__bar">
    <div class="pie-menu__container">
      <a href="{% url 'home' %}" class="pie-menu__logo-link" aria-label="GrupoPIE">
        <img src="{% static 'images/menu-logo-diamond.png' %}" alt="" class="pie-menu__logo-diamond" />
        <img src="{% static 'images/menu-logo-text.png' %}" alt="GrupoPIE" class="pie-menu__logo-text" />
      </a>

      <button id="pie-menu-toggle" class="pie-menu__toggle" aria-label="Abrir menu">☰</button>

      <nav id="pie-menu-nav" class="pie-menu__nav" aria-label="Navegação principal">
        <a href="{% url 'solutions' %}" class="pie-menu__item{% if active_menu == 'solutions' %} pie-menu__item--active{% endif %}">
          <span class="pie-menu__title">Conheça</span>
          <span class="pie-menu__subtitle">as nossas soluções</span>
        </a>
        <a href="{% url 'solutions' %}" class="pie-menu__item{% if active_menu == 'products' %} pie-menu__item--active{% endif %}">
          <span class="pie-menu__title">Escolha</span>
          <span class="pie-menu__subtitle">os nossos produtos</span>
        </a>
        <a href="{% url 'about' %}" class="pie-menu__item{% if active_menu == 'about' %} pie-menu__item--active{% endif %}">
          <span class="pie-menu__title">Sobre</span>
          <span class="pie-menu__subtitle">o GrupoPIE</span>
        </a>
      </nav>

      <a href="https://www.mycloudpie.com/" class="pie-menu__cloud-btn" target="_blank" rel="noopener">myCloud PIE</a>
    </div>
  </div>
</header>

<script>
  document.getElementById('pie-menu-toggle').addEventListener('click', function () {
    document.getElementById('pie-menu-nav').classList.toggle('is-open');
  });
</script>
